<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:">
  <title>博客图片压缩工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" role="img">
          <path d="M9 11a5 5 0 0 1 5-5h20a5 5 0 0 1 5 5v26a5 5 0 0 1-5 5H14a5 5 0 0 1-5-5V11Z"/>
          <path class="brand-line" d="m14 32 7-8 5 5 4-4 4 7M17 17h.1"/>
        </svg>
      </div>
      <div>
        <h1>博客图片压缩工具</h1>
        <p>批量减小图片体积，自动保留动画和 HDR 显示效果。</p>
      </div>
      <span class="platform-badge">Windows</span>
    </header>

    <section class="workspace" aria-labelledby="folders-heading">
      <div class="section-heading">
        <div>
          <span class="eyebrow">第 1 步</span>
          <h2 id="folders-heading">选择图片文件夹</h2>
        </div>
        <span class="section-hint">支持拖入文件夹 · 自动扫描子目录</span>
      </div>

      <div class="folder-grid">
        <div class="folder-field drop-zone" id="inputDropZone">
          <label for="inputDir">输入文件夹</label>
          <div class="path-row">
            <span class="folder-icon" aria-hidden="true">↘</span>
            <input id="inputDir" type="text" placeholder="选择需要压缩的图片文件夹" spellcheck="false">
            <button class="secondary-button" id="selectInput" type="button">浏览</button>
          </div>
          <small>不会动的 GIF 会按普通图片压缩</small>
        </div>

        <div class="folder-field drop-zone" id="outputDropZone">
          <label for="outputDir">输出文件夹</label>
          <div class="path-row">
            <span class="folder-icon" aria-hidden="true">↗</span>
            <input id="outputDir" type="text" placeholder="选择压缩后图片的保存位置" spellcheck="false">
            <button class="secondary-button" id="selectOutput" type="button">浏览</button>
          </div>
          <small>输出文件会保持原始目录层级</small>
        </div>
      </div>
    </section>

    <section class="settings-card" aria-labelledby="settings-heading">
      <div class="section-heading compact">
        <div>
          <span class="eyebrow">第 2 步</span>
          <h2 id="settings-heading">调整压缩效果</h2>
        </div>
        <button class="text-button" id="resetSettings" type="button">恢复默认</button>
      </div>

      <div class="workflow-settings">
        <fieldset class="workflow-card">
          <legend><span>普通图片</span><small>适合照片、截图和插图</small></legend>
          <div class="settings-grid">
            <label class="setting-control">
              <span>输出格式</span>
              <select id="staticFormat">
                <option value="webp">WebP（默认）</option>
                <option value="avif">AVIF</option>
              </select>
            </label>
            <label class="setting-control">
              <span>质量 <output id="staticQualityValue">80</output></span>
              <input id="staticQuality" type="range" min="1" max="100" step="1">
            </label>
            <label class="setting-control">
              <span>最长边限制</span>
              <span class="input-suffix">
                <input id="staticMaxResolution" type="number" min="1" max="65535" step="1">
                <span>px</span>
              </span>
            </label>
          </div>
        </fieldset>

        <fieldset class="workflow-card">
          <legend><span>GIF 动画</span><small>保留原来的播放次数和速度</small></legend>
          <div class="settings-grid">
            <label class="setting-control">
              <span>输出格式</span>
              <select id="animatedFormat">
                <option value="webp">WebP</option>
              </select>
            </label>
            <label class="setting-control">
              <span>质量 <output id="animatedQualityValue">80</output></span>
              <input id="animatedQuality" type="range" min="1" max="100" step="1">
            </label>
            <label class="setting-control">
              <span>最长边限制</span>
              <span class="input-suffix">
                <input id="animatedMaxResolution" type="number" min="1" max="65535" step="1">
                <span>px</span>
              </span>
            </label>
          </div>
        </fieldset>

        <fieldset class="workflow-card gainmap-card">
          <legend><span>HDR 照片</span><small>保留高光与暗部的显示效果</small></legend>
          <div class="settings-grid gainmap-grid">
            <label class="setting-control">
              <span>输出格式</span>
              <select id="gainMapFormat">
                <option value="avif">AVIF</option>
              </select>
            </label>
            <label class="setting-control">
              <span>画面质量 <output id="gainMapBaseQualityValue">80</output></span>
              <input id="gainMapBaseQuality" type="range" min="0" max="100" step="1">
            </label>
            <label class="setting-control">
              <span>HDR 效果质量 <output id="gainMapQualityValue">85</output></span>
              <input id="gainMapQuality" type="range" min="0" max="100" step="1">
            </label>
            <label class="setting-control">
              <span>最长边限制</span>
              <span class="input-suffix">
                <input id="gainMapMaxResolution" type="number" min="1" max="65535" step="1">
                <span>px</span>
              </span>
            </label>
            <label class="setting-control">
              <span>处理速度</span>
              <select id="speed">
                <option value="0">精细（耗时较长）</option>
                <option value="4">偏精细</option>
                <option value="6">均衡（推荐）</option>
                <option value="8">较快</option>
                <option value="10">最快</option>
              </select>
            </label>
            <label class="setting-control">
              <span>性能模式</span>
              <select id="threads">
                <option value="all">自动（推荐）</option>
                <option value="1">最少占用</option><option value="2">较低占用</option>
                <option value="4">均衡</option><option value="8">较高性能</option><option value="16">最高性能</option>
              </select>
            </label>
          </div>
        </fieldset>

        <div class="toggle-control metadata-control">
          <span>
            <strong>保留照片拍摄信息</strong>
            <small>可能包含拍摄设备、时间和位置，默认删除</small>
          </span>
          <label class="toggle-click-target" for="preserveMetadata" aria-label="保留照片拍摄信息">
            <input id="preserveMetadata" type="checkbox">
            <span class="toggle" aria-hidden="true"></span>
          </label>
        </div>
      </div>
    </section>

  </main>

  <footer class="action-bar">
    <div class="action-bar-inner" id="actionBarInner" data-state="idle">
      <div class="input-summary" id="inputSummary" aria-live="polite">
        <span class="input-summary-mark" id="inputCountMark" aria-hidden="true">0</span>
        <span class="input-summary-copy">
          <strong id="inputCountText">请选择输入文件夹</strong>
          <small id="inputCountHint">选择后会自动统计可压缩的图片</small>
        </span>
      </div>

      <section class="progress-card hidden" id="progressCard" aria-live="polite">
        <div class="progress-summary">
          <div>
            <span class="status-dot" id="statusDot"></span>
            <strong id="statusText">准备就绪</strong>
            <p id="currentFile">选择输入和输出文件夹后开始压缩</p>
          </div>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="stats">
          <span>总计 <strong id="totalCount">0</strong></span>
          <span class="success-stat">成功 <strong id="successCount">0</strong></span>
          <span class="failure-stat">失败 <strong id="failedCount">0</strong></span>
        </div>
        <details class="error-details" id="errorDetails">
          <summary>查看失败详情</summary>
          <ul id="errorList"></ul>
        </details>
      </section>

      <div class="footer-actions">
        <button class="primary-button" id="startConversion" type="button" disabled>
          <span>开始压缩</span><span aria-hidden="true">→</span>
        </button>
        <button class="danger-button hidden" id="cancelConversion" type="button">取消</button>
        <button class="secondary-button open-button hidden" id="openOutput" type="button">打开输出文件夹</button>
        <button class="primary-button hidden" id="continueConversion" type="button">
          <span>重新开始</span><span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast" role="alert"></div>
  <script src="app.js"></script>
</body>
</html>
